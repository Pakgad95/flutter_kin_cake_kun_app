name: flutter_kin_cake_kun_app
description: "A Flutter app for finding beautiful cake shops."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"


dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^7.0.2
  font_awesome_flutter: ^10.12.0
  intl: ^0.18.1
  url_launcher: ^6.3.2
  latlong2: ^0.9.1
  flutter_map: ^8.2.2
  carousel_slider: ^5.1.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  icons_launcher: ^3.0.3
  flutter_lints: ^6.0.0

icons_launcher:
  image_path: "assets/icon/icon.png"
  platforms:
    android:
      enable: true
    ios:
      enable: true


flutter:


  uses-material-design: true
  assets:
    - assets/images/
    - assets/icon/